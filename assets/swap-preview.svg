<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 500" role="img" aria-labelledby="title desc">
  <title id="title">SWAP application screens</title>
  <desc id="desc">Three SWAP mobile application screens showing feed, profile reviews, and chat.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#18820f" flood-opacity="0.13"/>
    </filter>
    <linearGradient id="photoA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3e5d5"/>
      <stop offset="1" stop-color="#d8ead1"/>
    </linearGradient>
    <linearGradient id="photoB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef0e8"/>
      <stop offset="1" stop-color="#f0d7d1"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="758" height="498" rx="8" fill="#f7fbf8" stroke="#d9e5dd"/>
  <g filter="url(#shadow)">
    <g transform="translate(48 30)">
      <rect width="190" height="430" rx="28" fill="#fff" stroke="#d9e5dd"/>
      <rect x="14" y="14" width="162" height="402" rx="22" fill="#fff" stroke="#edf1ee"/>
      <circle cx="33" cy="40" r="5" fill="#e7343f"/>
      <rect x="118" y="36" width="45" height="8" rx="4" fill="#dbe5df"/>
      <rect x="32" y="62" width="66" height="22" rx="10" fill="#18820f"/>
      <text x="65" y="77" fill="#fff" font-family="Arial, sans-serif" font-size="9" font-weight="700" text-anchor="middle">Give</text>
      <rect x="106" y="62" width="58" height="22" rx="10" fill="#fff" stroke="#18820f"/>
      <text x="135" y="77" fill="#18820f" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">Swap</text>
      <g transform="translate(32 100)">
        <rect width="62" height="92" rx="8" fill="#f4f6f4"/>
        <rect width="62" height="58" rx="6" fill="url(#photoA)"/>
        <rect x="7" y="64" width="46" height="5" rx="3" fill="#cbd9cf"/>
        <rect x="7" y="75" width="34" height="5" rx="3" fill="#cbd9cf"/>
      </g>
      <g transform="translate(102 100)">
        <rect width="62" height="92" rx="8" fill="#f4f6f4"/>
        <rect width="62" height="58" rx="6" fill="url(#photoB)"/>
        <rect x="7" y="64" width="48" height="5" rx="3" fill="#cbd9cf"/>
        <rect x="7" y="75" width="36" height="5" rx="3" fill="#cbd9cf"/>
      </g>
      <g transform="translate(32 206)">
        <rect width="62" height="92" rx="8" fill="#f4f6f4"/>
        <rect width="62" height="58" rx="6" fill="url(#photoB)"/>
        <rect x="7" y="64" width="50" height="5" rx="3" fill="#cbd9cf"/>
        <rect x="7" y="75" width="32" height="5" rx="3" fill="#cbd9cf"/>
      </g>
      <g transform="translate(102 206)">
        <rect width="62" height="92" rx="8" fill="#f4f6f4"/>
        <rect width="62" height="58" rx="6" fill="url(#photoA)"/>
        <rect x="7" y="64" width="48" height="5" rx="3" fill="#cbd9cf"/>
        <rect x="7" y="75" width="36" height="5" rx="3" fill="#cbd9cf"/>
      </g>
    </g>
    <g transform="translate(285 30)">
      <rect width="190" height="430" rx="28" fill="#fff" stroke="#d9e5dd"/>
      <rect x="14" y="14" width="162" height="402" rx="22" fill="#fff" stroke="#edf1ee"/>
      <text x="35" y="58" fill="#17211d" font-family="Arial, sans-serif" font-size="20">Reviews</text>
      <rect x="120" y="49" width="45" height="8" rx="4" fill="#dbe5df"/>
      <circle cx="95" cy="135" r="42" fill="#e3cac6"/>
      <rect x="30" y="196" width="130" height="14" rx="5" fill="#18820f"/>
      <rect x="30" y="222" width="128" height="5" rx="3" fill="#f2a91d"/>
      <rect x="30" y="236" width="95" height="5" rx="3" fill="#18820f"/>
      <rect x="30" y="250" width="120" height="5" rx="3" fill="#18820f"/>
      <rect x="30" y="264" width="130" height="5" rx="3" fill="#f2a91d"/>
      <rect x="30" y="278" width="92" height="5" rx="3" fill="#18820f"/>
      <rect x="30" y="302" width="130" height="15" rx="5" fill="#18820f"/>
    </g>
    <g transform="translate(522 30)">
      <rect width="190" height="430" rx="28" fill="#fff" stroke="#d9e5dd"/>
      <rect x="14" y="14" width="162" height="402" rx="22" fill="#fff" stroke="#edf1ee"/>
      <text x="36" y="58" fill="#17211d" font-family="Arial, sans-serif" font-size="20">Chat</text>
      <circle cx="158" cy="51" r="5" fill="#e7343f"/>
      <rect x="34" y="84" width="128" height="30" rx="14" fill="#f0f3f1"/>
      <text x="49" y="103" fill="#17211d" font-family="Arial, sans-serif" font-size="8">Hi, is it still available?</text>
      <rect x="72" y="126" width="90" height="46" rx="14" fill="#dff2df"/>
      <text x="87" y="147" fill="#17211d" font-family="Arial, sans-serif" font-size="8">Yes, we can arrange</text>
      <text x="87" y="158" fill="#17211d" font-family="Arial, sans-serif" font-size="8">pickup.</text>
      <rect x="34" y="184" width="128" height="30" rx="14" fill="#f0f3f1"/>
      <text x="50" y="203" fill="#17211d" font-family="Arial, sans-serif" font-size="8">Great. Thank you.</text>
      <rect x="34" y="228" width="128" height="14" rx="6" fill="#18820f"/>
      <rect x="72" y="260" width="90" height="34" rx="14" fill="#dff2df"/>
      <text x="90" y="281" fill="#17211d" font-family="Arial, sans-serif" font-size="8">Mark deal completed</text>
    </g>
  </g>
</svg>
